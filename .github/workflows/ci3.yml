# Atividade 02.3 - Utilizando variáveis
name: Terceiro Workflow

on:

  push:

env:
    CURSO: "Curso de Integração Contínua"

jobs:
  terceiro-job: 
    runs-on: ubuntu-latest
    steps:
    - run: echo "Terceiro passo"
    - name: Checkout
      uses: actions/checkout@v5
    - name: Curso
      run: echo "Curso de Integração Contínua"
    - name: Usuario que executou o workflow
      run: echo "Usuario ${{ github.actor }}"
    - name: Repositório
      run: echo "Repositório ${{ github.repository }}"
    - name: Branch
      run: echo "Branch ${{ github.ref_name }}"